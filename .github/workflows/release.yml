name: Release Build
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── macOS Universal (Intel + Apple Silicon) ──────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add universal target
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build (Universal Binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin

      - name: Rename artifacts for clarity
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle
          # Rename DMG
          for f in dmg/*.dmg; do
            mv "$f" "dmg/Ai-ThoughtFlow-Pro-${{ github.ref_name }}-macOS-Universal.dmg"
          done
          # Also zip the .app for users who prefer zip
          cd macos
          ditto -c -k --keepParent "Ai ThoughtFlow Pro.app" "../Ai-ThoughtFlow-Pro-${{ github.ref_name }}-macOS-Universal.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/*.zip

  # ── Windows x64 ─────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Rename artifacts for clarity
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          # Rename NSIS installer
          Get-ChildItem "$bundle/nsis/*.exe" | ForEach-Object {
            Rename-Item $_.FullName "Ai-ThoughtFlow-Pro-${{ github.ref_name }}-Windows-x64-安装版.exe"
          }
          # Rename MSI installer
          Get-ChildItem "$bundle/msi/*.msi" | ForEach-Object {
            Rename-Item $_.FullName "Ai-ThoughtFlow-Pro-${{ github.ref_name }}-Windows-x64.msi"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ai ThoughtFlow Pro ${{ github.ref_name }}"
          body: |
            ## Ai ThoughtFlow Pro ${{ github.ref_name }}

            ### 📥 下载指南
            | 文件 | 适用平台 | 说明 |
            |------|----------|------|
            | `...-macOS-Universal.dmg` | macOS (Intel + Apple Silicon) | 双击打开，拖入应用程序 |
            | `...-macOS-Universal.zip` | macOS (Intel + Apple Silicon) | 解压后拖入应用程序 |
            | `...-Windows-x64-安装版.exe` | Windows 10/11 (64位) | 双击安装，自动创建快捷方式 |
            | `...-Windows-x64.msi` | Windows 10/11 (64位) | 静默安装包 |

            > ⚠️ macOS 首次打开需在"系统设置 → 隐私与安全性"中允许运行
          files: |
            artifacts/macos-universal/*
            artifacts/windows-x64/*
          draft: false
          generateReleaseNotes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
