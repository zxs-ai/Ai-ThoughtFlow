name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── macOS Universal (Intel + Apple Silicon) ──────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Universal macOS)
        run: npx tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Rename macOS artifacts
        run: |
          VERSION="${{ github.ref_name }}"
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          # Rename DMG
          for f in "$BUNDLE"/dmg/*.dmg; do
            [ -f "$f" ] && mv "$f" "$BUNDLE/dmg/Ai-ThoughtFlow-Pro-${VERSION}-macOS-Universal.dmg"
          done
          # Zip the .app
          APP=$(find "$BUNDLE/macos" -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            ditto -c -k --keepParent "$APP" "$BUNDLE/Ai-ThoughtFlow-Pro-${VERSION}-macOS-Universal.zip"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/*.zip
          if-no-files-found: warn

  # ── Windows x64 ─────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Windows x64)
        run: npx tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Rename Windows artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $bundle = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          # Rename NSIS installer (.exe)
          Get-ChildItem "$bundle/nsis/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName "Ai-ThoughtFlow-Pro-${version}-Windows-x64-Setup.exe"
          }
          # Rename MSI installer
          Get-ChildItem "$bundle/msi/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName "Ai-ThoughtFlow-Pro-${version}-Windows-x64.msi"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ai ThoughtFlow Pro ${{ github.ref_name }}"
          body: |
            ## Ai ThoughtFlow Pro ${{ github.ref_name }}

            > 🎨 AI 智能图表生成工具 — 教育卡通风格，支持思维导图、流程图等 9 种图表类型

            ### 📥 下载安装

            | 文件 | 平台 | 说明 |
            |------|------|------|
            | `...-macOS-Universal.dmg` | macOS (Intel + Apple Silicon) | 双击打开，拖入应用程序文件夹 |
            | `...-macOS-Universal.zip` | macOS (Intel + Apple Silicon) | 解压后拖入应用程序文件夹 |
            | `...-Windows-x64-Setup.exe` | Windows 10/11 (64位) | 双击安装，自动创建桌面快捷方式 |
            | `...-Windows-x64.msi` | Windows 10/11 (64位) | 企业/静默部署包 |

            > ⚠️ macOS 首次打开若提示"未知来源"，请在「系统设置 → 隐私与安全性」中点击「仍要打开」

            ### ✨ 功能亮点
            - AI 自然语言生成图表（智能自动选型）
            - 支持上下文修改（二次对话调整已有图表）
            - 9 种卡通教育风格图表类型
            - 末端节点自动防重叠排版
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.msi
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
